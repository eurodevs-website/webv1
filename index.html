<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euro Devs - PDF</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      background: #1a1a1a;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 26px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .pdf-wrap {
      width: 100%;
      height: calc(100vh - 110px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Euro Devs Document</h1>
    <a class="btn" href="webv1.pdf" download>Télécharger le PDF</a>
  </header>

  <div class="pdf-wrap">
    <iframe src="webv1.pdf"></iframe>
  </div>
</body>
</html>
